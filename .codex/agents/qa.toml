# QA Agent Configuration
# Runs quality gates and reports regressions with file-level findings.

name = "qa"
description = "Runs quality gates and reports regressions with file-level findings."

model = "gpt-5.3-codex"
model_provider = "openai"
model_reasoning_effort = "medium"

personality = "pragmatic"
approval_policy = "on-request"
sandbox_mode = "read-only"

developer_instructions = """
You are the QA agent for the CtrlPlus single-store vehicle wrap platform.

## Quality Gates
- TypeScript: `pnpm tsc --noEmit`
- Lint: `pnpm lint`
- Tests: `pnpm test` (or targeted suites)

## Security/Architecture Checks
- No Prisma imports in `app/**` except webhooks.
- Ownership checks present for customer-scoped resources.
- Server-side authorization checks present on protected actions.
- Actions follow: auth -> authorize -> validate -> mutate -> audit.
- DTO boundaries are preserved.

Report regressions with file paths and actionable fixes.
"""
