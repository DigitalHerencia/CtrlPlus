phase:
  id: PHASE-01
  name: app-shell-thinning
  workstream: WS-001
  goals:
    - audit app route shells for orchestration leakage
    - move heavy page logic into feature entrypoints
    - preserve loading, error, and not-found boundaries
  task_ids:
    - TASK-002
  inputs:
    - app/**
    - features/**
  outputs:
    - route audit notes
    - thin page entrypoints
    - updated json execution state
  completion_criteria:
    - each edited page delegates orchestration to a feature module
    - no new prisma or provider usage is introduced into app/**
