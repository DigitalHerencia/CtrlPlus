name: Check Prompt Size

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    prompt-size-check:
        name: Prompt size check
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Run prompt size estimator
              run: |
                  node ./scripts/estimate-prompt-tokens.mjs --threshold=120000
              shell: bash
