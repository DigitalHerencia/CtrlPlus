name: Auto Close Stale Issues and PRs

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >-
            This issue has been marked stale due to inactivity. It will be closed in 5 days unless updated.
          stale-pr-message: >-
            This pull request has been marked stale due to inactivity. It will be closed in 5 days unless updated.
          close-issue-message: >-
            Closing stale issue after inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >-
            Closing stale pull request after inactivity. Reopen or create a new PR to continue.
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 5
          days-before-pr-close: 5
          stale-issue-label: status:stale
          stale-pr-label: status:stale
          exempt-issue-labels: p0,status:blocked
          exempt-pr-labels: status:blocked
