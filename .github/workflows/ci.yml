name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-quality:
    runs-on: ubuntu-latest

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      HUSKY: "0"

      # Local CI DB (optional for fast-quality; kept for consistency)
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      DATABASE_URL_UNPOOLED: postgresql://test:test@localhost:5432/test

      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_TENANT_DOMAIN_SUFFIX: .ctrlplus.local
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
      CLERK_SECRET_KEY: clerk_secret_placeholder
      CLERK_WEBHOOK_SIGNING_SECRET: whsec_placeholder
      CLERK_WEBHOOK_SECRET: whsec_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Keep pnpm version in sync with packageManager in package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Align with package.json engines.node (24.14.0)
          node-version: 24.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate quality gates
        run: pnpm ci:quality

  domain-e2e:
    runs-on: ubuntu-latest
    needs: fast-quality

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      HUSKY: "0"

      DATABASE_URL: postgresql://test:test@localhost:5432/test
      DATABASE_URL_UNPOOLED: postgresql://test:test@localhost:5432/test

      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_TENANT_DOMAIN_SUFFIX: .ctrlplus.local
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
      CLERK_SECRET_KEY: clerk_secret_placeholder
      CLERK_WEBHOOK_SIGNING_SECRET: whsec_placeholder
      CLERK_WEBHOOK_SECRET: whsec_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Run migrations (deploy)
        run: pnpm db:migrate:deploy

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run domain smoke e2e (chromium)
        run: pnpm test:e2e --project=chromium --reporter=line
