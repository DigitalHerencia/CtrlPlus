name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Install pnpm
              run: npm install -g pnpm@10.32.1

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate (lint / typecheck / prisma / tests)
              run: pnpm validate
