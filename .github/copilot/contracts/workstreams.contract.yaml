program:
  id: CTR-REF-001
  name: ctrlplus-server-first-refactor
  status: planned
  source_markdown:
    - .copilot/docs/refactor-prd.md
    - .copilot/docs/refactor-technical-requirements.md
    - .copilot/arch/server-first-refactor-architecture.md
  workstreams:
    - id: WS-001
      name: app-shell-thinning
      scope:
        - app/(auth)/**
        - app/(tenant)/**
        - app/api/**
      outputs:
        - thin page entrypoints
        - normalized loading/error/not-found boundaries
      dependencies: []
    - id: WS-002
      name: feature-orchestration-normalization
      scope:
        - features/**
      outputs:
        - consistent page-feature entrypoints
        - normalized client orchestration modules
      dependencies:
        - WS-001
    - id: WS-003
      name: component-boundary-cleanup
      scope:
        - components/**
      outputs:
        - reusable domain blocks
        - shared block cleanup
        - primitive isolation
      dependencies:
        - WS-002
    - id: WS-004
      name: server-authority-hardening
      scope:
        - lib/**
        - schemas/**
        - types/**
        - prisma/**
      outputs:
        - preserved read/write boundaries
        - explicit validation and dto contracts
      dependencies:
        - WS-001
        - WS-002
        - WS-003
    - id: WS-005
      name: contract-alignment
      scope:
        - .copilot/**
        - AGENTS.md
      outputs:
        - updated markdown
        - updated yaml
        - updated json execution state
      dependencies: []
    - id: WS-006
      name: verification-and-cutover
      scope:
        - repo-wide
      outputs:
        - verification evidence
        - final progress state
      dependencies:
        - WS-001
        - WS-002
        - WS-003
        - WS-004
  execution_rules:
    - id: EX-001
      statement: Each future pass must declare the task IDs it is advancing before code edits.
    - id: EX-002
      statement: Task status changes require JSON execution updates in the same pass.
    - id: EX-003
      statement: Contract changes require markdown justification before JSON scope changes.
