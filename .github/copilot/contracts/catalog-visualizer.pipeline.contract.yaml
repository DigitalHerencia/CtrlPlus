contract:
  id: CONTRACT-CATALOG-VISUALIZER-PIPELINE
  last_updated: 2026-03-30
  source_docs:
    - "C:\\Users\\scree\\Documents\\DevNotes\\Copilot Implementation Spec Visualizer Generation Pipeline Catalog-Driven Hugging Face Cloudinary.md"
    - "C:\\Users\\scree\\Documents\\DevNotes\\Vehicle Wrap Visualizer Research and Implementation Audit.md"
    - "D:\\CtrlPlus\\.copilot\\docs\\visualizer.md"
pipeline:
  status_values:
    - pending
    - processing
    - complete
    - failed
  primary_generation_mode:
    name: huggingface
    adapter_boundary: "lib/integrations/huggingface.ts"
  fallback_generation_mode:
    name: deterministic_fallback
    implementation_surface:
      - "lib/uploads/image-processing.ts"
      - "lib/actions/visualizer.actions.ts"
  required_storage:
    source_vehicle: durable_url
    generated_preview: durable_url
    provider: cloudinary
  traceability_fields:
    - cacheKey
    - sourceWrapImageId
    - sourceWrapImageVersion
    - ownerClerkUserId
  current_entrypoints:
    - "lib/actions/visualizer.actions.ts#createVisualizerPreview"
    - "lib/actions/visualizer.actions.ts#processVisualizerPreview"
    - "lib/actions/visualizer.actions.ts#regenerateVisualizerPreview"
boundaries:
  forbidden_in_client:
    - model selection
    - provider credentials
    - storage writes
    - source asset version authority
    - ownership decisions
  required_server_checks:
    - authenticated session
    - visualizer.use capability
    - wrap selection validity
    - preview ownership
    - upload validation
environment_requirements:
  required_for_full_generation:
    - CLOUDINARY_CLOUD_NAME
    - CLOUDINARY_API_KEY
    - CLOUDINARY_API_SECRET
    - HUGGINGFACE_API_TOKEN
    - HUGGINGFACE_VISUALIZER_PREVIEW_MODEL
  documented_in:
    - ".env.example"
  runtime_gap:
    - "Populated secrets are still required in the active local environment for full preview generation."
acceptance:
  - "Failure of Hugging Face generation must not force a full feature outage if deterministic fallback succeeds."
  - "Preview rows remain explainable and traceable through stored metadata."
  - "Storage remains durable and URL-based rather than inline payload based."
