# Server Action / Mutation Pipeline - Current Repo Contract

version: 2
mode: single-store
status: active

summary:
  - "All server mutations authenticate first."
  - "Authorization is capability-based and record-scoped."
  - "Do not invent tenantId filters for models that are not tenant-scoped."
  - "All successful writes are validated, audited, and revalidated."

pipeline:
  - step: authenticate
    rule: "Call getSession() or requireAuth() and stop if the user is not authenticated."
  - step: authorize
    rule: "Use requireCapability(session.authz, capability) and record ownership filters where applicable."
  - step: validate
    rule: "Parse input with the domain Zod schema before mutating."
  - step: mutate
    rule: "Write through lib/actions/* only. Scope queries by ownership/deletedAt when the model supports it."
  - step: audit
    rule: "Write an AuditLog entry with action, resourceType, resourceId, and JSON-stringified details."
  - step: revalidate
    rule: "Use revalidateTag() for targeted cache invalidation and return DTOs, not raw Prisma models."

required_checks:
  - "Never trust client-provided role, owner, booking, invoice, wrap, or preview scope."
  - "Never require tenantId on a mutation unless the schema for that domain actually stores tenant scope."
  - "Preserve current preview ownership checks on visualizer records."
  - "Preserve authenticated access for catalog and visualizer routes."

validation_checklist:
  - "Authenticated before mutation"
  - "Capability or ownership enforced server-side"
  - "Input parsed with schema.parse()"
  - "Audit log written on success"
  - "Cache tags revalidated after success"
  - "DTO returned to callers"
