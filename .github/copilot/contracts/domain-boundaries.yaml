domains:
   - id: DOM-001
      name: auth
      scope:
         - app/(auth)/**
         - features/auth/**
         - components/auth/**
         - lib/auth/**
         - lib/authz/**
      focus:
         - thin auth route shells
         - preserve server-side identity authority

   - id: DOM-002
      name: admin
      scope:
         - app/(tenant)/admin/**
         - features/admin/**
         - components/admin/**
         - lib/actions/admin.actions.ts
         - lib/fetchers/admin.fetchers.ts
      focus:
         - owner/admin operational orchestration
         - cross-domain dashboard composition

   - id: DOM-003
      name: billing
      scope:
         - app/(tenant)/billing/**
         - features/billing/**
         - components/billing/**
         - lib/actions/billing.actions.ts
         - lib/fetchers/billing.fetchers.ts
      focus:
         - invoice and checkout flows under billing naming
         - preserve server-authoritative payment state

   - id: DOM-004
      name: catalog
      scope:
         - app/(tenant)/catalog/**
         - features/catalog/**
         - components/catalog/**
         - lib/actions/catalog.actions.ts
         - lib/fetchers/catalog.fetchers.ts
         - lib/fetchers/catalog.mappers.ts
      focus:
         - wrap storefront and wrap management
         - deterministic visualizer handoff

   - id: DOM-005
      name: platform
      scope:
         - app/(tenant)/platform/**
         - features/platform/**
         - components/platform/**
         - lib/actions/platform.actions.ts
         - lib/fetchers/platform.fetchers.ts
      focus:
         - platform diagnostics and recovery workflows
         - operational tooling boundaries

   - id: DOM-006
      name: scheduling
      scope:
         - app/(tenant)/scheduling/**
         - features/scheduling/**
         - components/scheduling/**
         - lib/actions/scheduling.actions.ts
         - lib/fetchers/scheduling.fetchers.ts
      focus:
         - booking workflows
         - slot and reservation integrity

   - id: DOM-007
      name: settings
      scope:
         - app/(tenant)/settings/**
         - features/settings/**
         - components/settings/**
         - lib/actions/settings.actions.ts
         - lib/fetchers/settings.fetchers.ts
      focus:
         - authenticated settings forms with owner-only account/export operations
         - server-validated configuration saves

   - id: DOM-008
      name: visualizer
      scope:
         - app/(tenant)/visualizer/**
         - features/visualizer/**
         - components/visualizer/**
         - lib/actions/visualizer.actions.ts
         - lib/fetchers/visualizer.fetchers.ts
         - lib/fetchers/visualizer.mappers.ts
         - lib/uploads/**
         - lib/integrations/**
      focus:
         - status-driven preview workflows
         - server-side generation and storage boundaries
