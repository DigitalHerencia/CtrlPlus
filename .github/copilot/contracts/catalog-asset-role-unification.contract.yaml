version: 1
contract: catalog-asset-role-unification
status: active
source_prompt: .github/copilot/prompts/catalog-asset-role-unification.md
objective: Replace fragile image-order assumptions with explicit role-based asset resolution.

scope:
    domains:
        - catalog
        - visualizer
    paths:
        - lib/fetchers/catalog/**
        - components/catalog/**
        - features/catalog/**
        - schemas/catalog.schemas.ts
        - types/catalog.types.ts

asset_roles:
    enum:
        - hero
        - gallery
        - visualizer_texture
        - visualizer_mask_hint
        - swatch

hard_rules:
    - id: no-images-zero-access
      rule: Do not use images[0] for role selection in catalog flow.
    - id: hero-resolution
      rule: Hero asset must be resolved by explicit role (kind == hero).
    - id: gallery-resolution
      rule: Gallery assets must be resolved by explicit role (kind == gallery).
    - id: texture-resolution
      rule: Visualizer texture must be resolved by explicit role (kind == visualizer_texture).
    - id: component-input-contract
      rule: Components must receive pre-resolved DTO role fields; avoid in-component role filtering where possible.

dto_requirements:
    wrap_list_dto:
        required_fields:
            heroUrl: string | null
    wrap_detail_dto:
        required_fields:
            heroImage: WrapImageDTO | null
            gallery: WrapImageDTO[]
            visualizerTexture: WrapImageDTO | null

fetcher_requirements:
    - name: getCatalogWraps
      must_return:
          - WrapListDTO[] with heroUrl resolved
    - name: getWrapDetail
      must_return:
          - WrapDetailDTO with heroImage, gallery, visualizerTexture resolved
    - name: getWrapAssets
      must_support:
          - role filter parameter

acceptance_criteria:
    - grep -r "images\[0\]" in catalog scope returns zero matches.
    - Grid, detail, and visualizer selection render by explicit asset role.
    - Reordering images does not alter displayed role-specific output.

testing:
    required_e2e:
        - Create wrap with hero, gallery, and texture assets.
        - Verify grid uses hero, detail uses gallery, visualizer uses texture.
        - Reorder assets and verify role output remains unchanged.

implementation_order:
    - Audit references using images[0]
    - Update DTO/schema fields
    - Refactor fetcher role resolution
    - Update components to consume pre-resolved role fields
    - Run unit and E2E validation
