version: 1
contract: tracking-workflow
status: active
source: .copilot-tracking/** (deduplicated)
objective: Normalize repeated implementation workflow directives from tracking artifacts while keeping context minimal.

common_workflow:
    sequence:
        - create-change-log-file
        - execute-plan-by-phase
        - honor-phase-task-stop-flags
        - summarize-and-link-results
        - cleanup-source-prompt

execution_rules:
    - id: route-thinness
      rule: app/** files remain orchestration-only and feature-driven.
    - id: layer-boundaries
      rule: No Prisma imports in app/**, features/**, or components/**.
    - id: read-write-boundaries
      rule: reads via lib/fetchers/** and writes via lib/actions/**.
    - id: mutation-pipeline
      rule: auth -> authz -> validate -> mutate -> audit -> revalidate.

stop_controls:
    phaseStop:
        default: true
        behavior: pause for review after each phase when enabled.
    taskStop:
        default: false
        behavior: pause for review after each task when enabled.

cleanup_policy:
    source_tracking_files:
        action: delete_after_migration
        rationale: avoid duplicate context and stale references.
    docs_update_policy:
        action: only_if_required
        rationale: prevent context bloat.
