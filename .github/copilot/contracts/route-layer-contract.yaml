rules:
  app:
    allowed:
      - "route shells"
      - "layout.tsx"
      - "loading.tsx"
      - "error.tsx"
      - "not-found.tsx"
      - "thin page.tsx"
      - "route.ts"
    forbidden:
      - "Prisma access"
      - "provider SDK orchestration"
      - "heavy DTO shaping"
      - "business mutations"
  features:
    allowed:
      - "page orchestration"
      - "client interaction containers"
      - "fetcher composition"
      - "URL and suspense orchestration"
    forbidden:
      - "direct Prisma access"
      - "primitive UI ownership"
  components:
    allowed:
      - "presentational blocks"
      - "reusable field groups"
      - "cards, tables, grids, panels, tabs"
    forbidden:
      - "server authority"
      - "authz decisions"
      - "provider adapters"
  ui:
    allowed:
      - "shadcn primitives"
      - "Radix wrappers"
    forbidden:
      - "domain logic"
      - "fetchers"
      - "actions"
route_targets:
  "app/(tenant)/catalog/page.tsx":
    target_feature: "features/catalog/catalog-browse-page-feature.tsx"
  "app/(tenant)/catalog/[wrapId]/page.tsx":
    target_feature: "features/catalog/catalog-detail-page-feature.tsx"
  "app/(tenant)/catalog/manage/page.tsx":
    target_feature: "features/catalog/manage/wrap-manager-page-feature.tsx"
  "app/(tenant)/catalog/manage/new/page.tsx":
    target_feature: "features/catalog/manage/new-wrap-page-feature.tsx"
  "app/(tenant)/catalog/manage/[wrapId]/page.tsx":
    target_feature: "features/catalog/manage/wrap-manager-detail-page-feature.tsx"
  "app/(tenant)/billing/page.tsx":
    target_feature: "features/billing/invoices-dashboard-page-feature.tsx"
  "app/(tenant)/visualizer/page.tsx":
    target_feature: "features/visualizer/visualizer-workspace-page-feature.tsx"
  "app/(tenant)/visualizer/previews/page.tsx":
    target_feature: "features/visualizer/previews/preview-gallery-page-feature.tsx"
  "app/(tenant)/visualizer/previews/new/page.tsx":
    target_feature: "features/visualizer/previews/new-preview-page-feature.tsx"
  "app/(tenant)/visualizer/previews/[previewId]/page.tsx":
    target_feature: "features/visualizer/previews/preview-detail-page-feature.tsx"
  "app/(tenant)/visualizer/previews/[previewId]/edit/page.tsx":
    target_feature: "features/visualizer/previews/edit-preview-page-feature.tsx"
  "app/(tenant)/visualizer/uploads/page.tsx":
    target_feature: "features/visualizer/uploads/upload-gallery-page-feature.tsx"
  "app/(tenant)/visualizer/uploads/[uploadId]/page.tsx":
    target_feature: "features/visualizer/uploads/upload-detail-page-feature.tsx"
