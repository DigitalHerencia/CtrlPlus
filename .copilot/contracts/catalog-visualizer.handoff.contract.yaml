contract:
  id: CONTRACT-CATALOG-VISUALIZER-HANDOFF
  last_updated: 2026-03-30
  source_docs:
    - "C:\\Users\\scree\\Documents\\DevNotes\\Copilot Implementation Spec Catalog Wrap-Driven Visualizer Migration.md"
    - "C:\\Users\\scree\\Documents\\DevNotes\\Copilot Implementation Spec Visualizer Generation Pipeline Catalog-Driven Hugging Face Cloudinary.md"
    - "D:\\CtrlPlus\\.copilot\\docs\\catalog.md"
    - "D:\\CtrlPlus\\.copilot\\docs\\visualizer.md"
ownership:
  catalog:
    owns:
      - wrap discovery
      - wrap detail presentation
      - asset intent and role resolution
      - publish readiness
      - visualizer selection eligibility
  visualizer:
    owns:
      - vehicle upload
      - preview row lifecycle
      - generation and fallback orchestration
      - preview ownership and review
handoff:
  route: "/visualizer?wrapId={wrapId}"
  server_validation_required: true
  client_authority_forbidden:
    - wrap visibility
    - wrap eligibility
    - texture URL
    - source asset version
required_selection_fields:
  - id
  - name
  - description
  - heroImage
  - visualizerTextureImage.id
  - visualizerTextureImage.url
  - visualizerTextureImage.version
  - visualizerTextureImage.contentHash
  - aiPromptTemplate
  - aiNegativePrompt
eligibility_rules:
  - wrap exists
  - wrap is not deleted
  - wrap is visible unless owner or platform admin scope allows hidden content
  - wrap readiness is visualizer-ready
  - exactly one active visualizer texture is resolved
  - hero image and display asset semantics remain deterministic
implementation_surfaces:
  current_catalog_fetchers:
    - "lib/fetchers/catalog.fetchers.ts"
    - "lib/fetchers/catalog.mappers.ts"
  current_visualizer_fetchers:
    - "lib/fetchers/visualizer.fetchers.ts"
  current_types:
    - "types/catalog.types.ts"
    - "types/visualizer.types.ts"
acceptance:
  - "Catalog remains the only source for visualizer-selectable wraps."
  - "Visualizer consumes a server-validated selection DTO, not raw client input."
  - "Changing wrap asset meaning requires updating markdown, YAML, and JSON artifacts together."
