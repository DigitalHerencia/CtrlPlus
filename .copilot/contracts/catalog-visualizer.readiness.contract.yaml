contract:
  id: CONTRACT-CATALOG-VISUALIZER-READINESS
  last_updated: 2026-03-30
  source_docs:
    - "D:\\CtrlPlus\\.copilot\\docs\\catalog-visualizer-prep-status.md"
    - "D:\\CtrlPlus\\.copilot\\execution\\catalog-visualizer.validation.json"
readiness:
  state: conditional_ready
  meaning: >
    Catalog and visualizer implementation can proceed, but the repo is not in a
    fully green validation state. Future work must treat current lint,
    typecheck, and test failures as active constraints.
required_context_before_editing:
  - ".copilot/docs/catalog.md"
  - ".copilot/docs/visualizer.md"
  - ".copilot/docs/catalog-visualizer-prep-status.md"
  - ".copilot/contracts/catalog-visualizer.handoff.contract.yaml"
  - ".copilot/contracts/catalog-visualizer.pipeline.contract.yaml"
  - ".copilot/execution/catalog-visualizer.backlog.json"
  - ".copilot/execution/catalog-visualizer.progress.json"
  - ".copilot/execution/catalog-visualizer.decisions.json"
  - ".copilot/execution/catalog-visualizer.validation.json"
known_blocker_classes:
  - import and alias drift
  - repo-wide typecheck failures outside catalog and visualizer
  - vitest server-only resolution issues
  - legacy tests referencing removed symbols
  - incomplete visualizer env documentation
validation_order:
  - node and pnpm versions
  - prisma validate
  - lint
  - typecheck
  - unit tests
  - build
implementation_guidance:
  - "Prefer bounded catalog or visualizer phase prompts instead of open-ended broad refactors."
  - "Repair shared blockers only when they directly block the chosen phase."
  - "Update execution JSON immediately after any change in scope, blocker state, or validation outcome."
